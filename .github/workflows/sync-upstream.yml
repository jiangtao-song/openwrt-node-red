# 自动同步官方node-red上游源码并更新OpenWrt Makefile版本
name: 同步Node-RED官方上游源码
on:
  # 每日UTC凌晨1点自动执行
  schedule:
    - cron: '0 1 * * *'
  # 支持网页手动一键同步
  workflow_dispatch:

jobs:
  sync-node-red:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取当前仓库完整代码
      - name: 检出当前仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置Git提交身份，避免commit报错
      - name: 配置Git提交者
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3. 调用GitHub官方API，直接读取最新正式Release（最稳定，不会抓取旧tag）
      - name: API获取Node-RED最新正式版本
        id: get_latest_ver
        run: |
          # 请求官方仓库最新release接口
          LATEST_TAG=$(curl -s https://api.github.com/repos/node-red/node-red/releases/latest | jq -r '.tag_name')
          # 去除前缀v，得到纯数字版本号
          LATEST_VER=${LATEST_TAG#v}
          echo "官方最新Release版本: $LATEST_VER"
          # 写入全局环境变量
          echo "LATEST_VER=$LATEST_VER" >> "$GITHUB_ENV"

      # 4. 替换Makefile中的版本号
      - name: 更新Makefile版本
        run: |
          sed -i "s/^PKG_VERSION:=.*/PKG_VERSION:=$LATEST_VER/" Makefile
          git add Makefile

      # 5. 提交并推送更新
      - name: 提交版本变更
        run: |
          git commit -m "同步上游Node-RED v$LATEST_VER，更新编译版本" || echo "版本已是最新，无变更无需提交"
          git push origin main
